name: Android debug APK

on:
  push:
    branches: [ "main", "codex/android-app" ]
    paths:
      - "quarkdown-android/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - ".github/workflows/android-debug-apk.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        run: ./gradlew :quarkdown-android:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: quarkdown-android-debug-apk
          path: quarkdown-android/build/outputs/apk/debug/*.apk
